<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Rajan Dadda Tours</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --gold: #C9A84C;
            --gold-light: #E4C96A;
            --gold-dark: #A07830;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0A0B0D;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        /* Background radial glows */
        body::before {
            content: '';
            position: absolute;
            top: -30%; left: -20%;
            width: 700px; height: 700px;
            background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%);
            pointer-events: none;
        }
        body::after {
            content: '';
            position: absolute;
            bottom: -30%; right: -20%;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(201,168,76,0.04) 0%, transparent 70%);
            pointer-events: none;
        }
        .login-wrap {
            width: 100%; max-width: 440px;
            padding: 20px;
            position: relative; z-index: 1;
        }
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .login-logo {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; font-weight: 900; color: #000;
            margin: 0 auto 20px;
            box-shadow: 0 12px 40px rgba(201,168,76,0.3);
        }
        .login-header h1 {
            font-size: 22px; font-weight: 800;
            color: #E8E6E1; margin-bottom: 6px;
        }
        .login-header p { font-size: 13px; color: rgba(232,230,225,0.4); }
        .login-card {
            background: #16191F;
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 20px;
            padding: 36px;
        }
        .form-group { margin-bottom: 20px; }
        .form-label {
            display: block;
            font-size: 11px; font-weight: 700;
            letter-spacing: 1px; text-transform: uppercase;
            color: rgba(232,230,225,0.5);
            margin-bottom: 8px;
        }
        .input-wrap {
            position: relative;
        }
        .input-wrap i {
            position: absolute; left: 14px; top: 50%;
            transform: translateY(-50%);
            color: rgba(232,230,225,0.3); font-size: 14px;
        }
        .form-control {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 10px;
            padding: 13px 14px 13px 42px;
            font-size: 14px; color: #E8E6E1;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.25s;
        }
        .form-control:focus {
            border-color: var(--gold);
            background: rgba(201,168,76,0.05);
        }
        .form-control::placeholder { color: rgba(232,230,225,0.2); }
        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border: none; border-radius: 10px;
            padding: 14px; font-size: 14px; font-weight: 700;
            color: #000; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, var(--gold-light), var(--gold));
            transform: translateY(-1px);
            box-shadow: 0 12px 36px rgba(201,168,76,0.35);
        }
        .alert-danger {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            color: #ef4444;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 13px;
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 20px;
        }
        .back-link {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            margin-top: 24px;
            font-size: 13px; color: rgba(232,230,225,0.35);
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--gold); }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="login-header">
            <div class="login-logo">RD</div>
            <h1>Admin Portal</h1>
            <p>Sign in to manage your website</p>
        </div>
        <div class="login-card">
            {% if messages %}
                {% for msg in messages %}
                <div class="alert-danger">
                    <i class="fas fa-exclamation-circle"></i> {{ msg }}
                </div>
                {% endfor %}
            {% endif %}
            <form method="POST" action="{% url 'dashboard_login' %}">
                {% csrf_token %}
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <div class="input-wrap">
                        <i class="fas fa-user"></i>
                        <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                    </div>
                </div>
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>
        </div>
        <a href="{% url 'home' %}" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Website
        </a>
    </div>
</body>
</html>
